mixed-port: 7890
mode: rule

proxies:
  - name: entry
    type: ss
    server: entry.example.com
    port: 443
    cipher: aes-128-gcm
    password: password
    dialer-proxy: relay
  - name: exit
    type: ss
    server: exit.example.com
    port: 443
    cipher: aes-128-gcm
    password: password

proxy-groups:
  - name: relay
    type: select
    proxies:
      - exit

rules:
  - MATCH,entry

